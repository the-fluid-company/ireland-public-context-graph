name: CI
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '17 3 * * *'
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:data
      - run: pnpm check
      - run: pnpm test
      - run: pnpm build
